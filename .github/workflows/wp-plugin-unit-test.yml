name: WordPress Plugin Unit test

on:
  push:
    branches:
      - '*'
    tags:
      - '!*'

jobs:
  plugin-test:
    name: run ${{ matrix.os }} * ${{ matrix.php }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        php: [ 7.1, 7.2, 7.3 , 7.4 ]
        WP_VERSION: [ latest, nightly ]
        WP_MULTISITE: [ 0, 1 ]

    steps:
      - uses: actions/checkout@v2

      - name: setup PHP ${{ matrix.php }}
        uses: nanasess/setup-php@master
        with:
          php-version: ${{ matrix.php }}

      - name: install wp tests
        run: bin/install-wp-tests.sh wordpress_test root '' localhost $WP_VERSION
        shell: bash

      - name: run phpunit
        env:
          WP_VERSION: ${{ matrix.WP_VERSION }}
          WP_MULTISITE: ${{ matrix.WP_MULTISITE }}
        run: phpunit
