name: WordPress Plugin Unit test

on:
  push:
    branches:
      - '*'
    tags:
      - '!*'

jobs:
  plugin-test:
    name: WordPress ${{ matrix.wordpress }} * PHP v${{ matrix.php }} * ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        php: [ '5.6', '7.0', '7.1', '7.2', '7.3', '7.4' ]
        wordpress: [ latest, nightly ]

    steps:
      - uses: actions/checkout@v2

      - name: Setup PHP v${{ matrix.php }}
        uses: nanasess/setup-php@master
        with:
          php-version: ${{ matrix.php }}

      - name: Start MySQL
        run: sudo /etc/init.d/mysql start

      - name: Install PHPUnit for PHP v5.6
        run: composer global require "phpunit/phpunit=4.8.*|5.4.*|5.7.*|6.*|7.*"
        if: ${{ matrix.php == '5.6' }}

      - name: Install wp tests
        run: bin/install-wp-tests.sh wordpress_test root root localhost $WP_VERSION
        shell: bash
        env:
          WP_VERSION: ${{ matrix.wordpress }}

      - name: Run phpunit - WordPress ${{ matrix.wordpress }}
        env:
          WP_VERSION: ${{ matrix.wordpress }}
        run: phpunit
