name: WordPress Plugin Unit test

on:
  push:
    branches:
      - '*'
    tags:
      - '!*'

jobs:
  plugin-test:
    name: WordPress ${{ matrix.WP_VERSION }} * PHP v${{ matrix.php }} * ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        php: [ '5.6', '7.1', '7.2', '7.3', '7.4' ]
        WP_VERSION: [ latest, nightly ]

    steps:
      - uses: actions/checkout@v2

      - name: Setup PHP v${{ matrix.php }}
        uses: nanasess/setup-php@master
        with:
          php-version: ${{ matrix.php }}

      - name: Start MySQL
        run: sudo /etc/init.d/mysql start

      - name: Install wp tests
        run: bin/install-wp-tests.sh wordpress_test root root localhost $WP_VERSION
        shell: bash
        env:
          WP_VERSION: ${{ matrix.WP_VERSION }}

      - name: Run phpunit - WordPress ${{ matrix.WP_VERSION }}
        env:
          WP_VERSION: ${{ matrix.WP_VERSION }}
        run: phpunit
