name: WordPress Plugin Unit test

on:
  push:
    branches:
      - '*'
    tags:
      - '!*'

jobs:
  plugin-test:
    name: run WordPress ${{ matrix.WP_VERSION }} * PHP v${{ matrix.php }} * ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        php: [ 7.1, 7.2, 7.3 , 7.4 ]
        WP_VERSION: [ latest, nightly ]

    steps:
      - uses: actions/checkout@v2

      - name: setup PHP v${{ matrix.php }}
        uses: nanasess/setup-php@master
        with:
          php-version: ${{ matrix.php }}

      - name: setup MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '5.7'
          mysql root password: 'password'

      - name: install wp tests
        run: bin/install-wp-tests.sh wordpress_test root password localhost $WP_VERSION
        shell: bash
        env:
          WP_VERSION: ${{ matrix.WP_VERSION }}

      - name: run phpunit - WordPress ${{ matrix.WP_VERSION }}
        env:
          WP_VERSION: ${{ matrix.WP_VERSION }}
        run: phpunit
